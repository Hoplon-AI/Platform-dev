name: CDK Deploy to Dev

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    workflow_dispatch:

env:
    AWS_REGION: eu-west-1
    AWS_ACCOUNT_ID: "025215344919"
    CDK_DEFAULT_ACCOUNT: "025215344919"
    CDK_DEFAULT_REGION: eu-west-1

permissions:
    id-token: write # Required for OIDC
    contents: read # Required for checkout
    statuses: write # Required for commit status updates

jobs:
    lint-and-test:
        name: Lint and Test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
                  cache: "pip"

            - name: Install Python dependencies
              working-directory: infrastructure/aws/cdk
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Run linting
              working-directory: infrastructure/aws/cdk
              run: |
                  pip install ruff
                  ruff check . || true  # Non-blocking for now

    cdk-synth:
        name: CDK Synth
        runs-on: ubuntu-latest
        needs: lint-and-test
        # Only run synthesis on pushes to main, not on pull requests
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
                  cache: "pip"

            - name: Install CDK CLI
              run: npm install -g aws-cdk

            - name: Install Python dependencies
              working-directory: infrastructure/aws/cdk
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: arn:aws:iam::025215344919:role/github-actions-platform-dev
                  aws-region: eu-west-1

            - name: CDK Synth
              working-directory: infrastructure/aws/cdk
              run: cdk synth

            - name: Upload synth output
              uses: actions/upload-artifact@v4
              with:
                  name: cdk-synth-output
                  path: infrastructure/aws/cdk/cdk.out
                  retention-days: 1

    cdk-diff:
        name: CDK Diff
        runs-on: ubuntu-latest
        needs: lint-and-test
        # Only run diff on pull requests
        if: github.event_name == 'pull_request'
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
                  cache: "pip"

            - name: Install CDK CLI
              run: npm install -g aws-cdk

            - name: Install Python dependencies
              working-directory: infrastructure/aws/cdk
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: arn:aws:iam::025215344919:role/github-actions-platform-dev
                  aws-region: eu-west-1

            - name: CDK Diff
              working-directory: infrastructure/aws/cdk
              run: cdk diff || true # Don't fail on diff

            - name: Comment PR with diff
              if: github.event_name == 'pull_request'
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');
                      try {
                        const diff = fs.readFileSync('${{ github.workspace }}/infrastructure/aws/cdk/cdk.diff', 'utf8');
                        github.rest.issues.createComment({
                          issue_number: context.issue.number,
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          body: '## CDK Diff\n\n```\n' + diff + '\n```'
                        });
                      } catch (error) {
                        console.log('No diff file found or error reading diff');
                      }

    cdk-deploy:
        name: CDK Deploy to Dev
        runs-on: ubuntu-latest
        needs: cdk-synth
        # FIXME [KAN-463] Deployment is intentionally disabled for now.
        # Re-enable by changing this to:
        # if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        if: false
        environment:
            name: dev
            url: https://console.aws.amazon.com/cloudformation/home?region=eu-west-1
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
                  cache: "pip"

            - name: Install CDK CLI
              run: npm install -g aws-cdk

            - name: Install Python dependencies
              working-directory: infrastructure/aws/cdk
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: arn:aws:iam::025215344919:role/github-actions-platform-dev
                  aws-region: eu-west-1

            - name: Post deployment status (pending)
              uses: actions/github-script@v7
              with:
                  script: |
                      const { owner, repo } = context.repo;
                      const sha = context.payload.after || context.sha;
                      await github.rest.repos.createCommitStatus({
                          owner,
                          repo,
                          sha,
                          state: 'pending',
                          target_url: `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`,
                          description: 'CDK deployment in progress...',
                          context: 'cdk/deploy-dev'
                      });

            - name: CDK Deploy
              working-directory: infrastructure/aws/cdk
              run: cdk deploy --all --require-approval never
              continue-on-error: true

            - name: Post deployment status (success)
              if: success()
              uses: actions/github-script@v7
              with:
                  script: |
                      const { owner, repo } = context.repo;
                      const sha = context.payload.after || context.sha;
                      await github.rest.repos.createCommitStatus({
                          owner,
                          repo,
                          sha,
                          state: 'success',
                          target_url: `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`,
                          description: 'CDK deployment completed successfully',
                          context: 'cdk/deploy-dev'
                      });

            - name: Post deployment status (failure)
              if: failure()
              uses: actions/github-script@v7
              with:
                  script: |
                      const { owner, repo } = context.repo;
                      const sha = context.payload.after || context.sha;
                      await github.rest.repos.createCommitStatus({
                          owner,
                          repo,
                          sha,
                          state: 'failure',
                          target_url: `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`,
                          description: 'CDK deployment failed',
                          context: 'cdk/deploy-dev'
                      });

            - name: Get stack outputs
              if: success()
              working-directory: infrastructure/aws/cdk
              run: |
                  aws cloudformation describe-stacks \
                    --stack-name CdkStack \
                    --region eu-west-1 \
                    --query 'Stacks[0].Outputs' \
                    --output json || echo "No outputs found"
