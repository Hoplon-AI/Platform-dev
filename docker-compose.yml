services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: platform-dev-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: platform_dev
    ports:
      - "5432:5432"
    volumes:
      - platform-dev-pgdata:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d platform_dev"]
      interval: 3s
      timeout: 5s
      retries: 30

  localstack:
    image: localstack/localstack:latest
    container_name: platform-dev-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      DEBUG: "0"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - platform-dev-localstack:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4566/_localstack/health | grep -q running"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  platform-dev-pgdata:
  platform-dev-localstack:

